<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAX Context — pbi-vulcanus</title>
<link rel="stylesheet" href="../shared/theme.css">
<link rel="stylesheet" href="dax-context.css">
</head>
<body>

<div class="top-bar">
  <a href="../index.html" class="nav-back">&larr; Menu</a>
  <h1>DAX <em>Context</em> &mdash; pbi-vulcanus</h1>
  <div class="status-group">
    <span>Wierszy: <span class="val" id="cntRows">&ndash;</span></span>
    <span>Modyfikator&#243;w: <span class="val" id="cntMods">&ndash;</span></span>
    <span>SUM: <span class="val" id="cntSum">&ndash;</span></span>
  </div>
</div>

<div class="app-layout">

  <div class="ribbon">
    <div class="ribbon-section">
      <div class="ribbon-group">
        <select id="dataPreset">
          <option value="orders">Zam&#243;wienia klient&#243;w</option>
          <option value="products">Produkty i sprzeda&#380;</option>
          <option value="suppliers">Dostawcy i magazyn</option>
        </select>
        <span class="hint">Kliknij nag&#322;&#243;wek kolumny, aby doda&#263; modyfikator filtru</span>
      </div>
      <div class="ribbon-section-label">Dane testowe</div>
    </div>
  </div>

  <div class="slicer-bar" id="slicerBar"></div>

  <div class="main-content">

    <div class="dax-panels">

      <div class="dax-panel">
        <div class="dax-panel-header ctx-source"><span class="tag">1</span> Tabela danych</div>
        <div class="dax-panel-body" id="panelSource"></div>
      </div>

      <div class="dax-panel dax-panel-formula">
        <div class="dax-panel-header ctx-formula"><span class="tag">DAX</span> Metryka</div>
        <div class="dax-panel-body dax-formula-body" id="panelFormula"></div>
      </div>

      <div class="dax-panel">
        <div class="dax-panel-header ctx-result"><span class="tag">2</span> Co widzi metryka</div>
        <div class="dax-panel-body" id="panelResult"></div>
      </div>

    </div>

  </div>
</div>

<script src="../shared/datasets.js"></script>
<script src="../shared/engine.js"></script>
<script src="dax-context.js"></script>
</body>
</html>
