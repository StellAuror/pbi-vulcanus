<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Append — pbi-vulcanus</title>
<link rel="stylesheet" href="../shared/theme.css">
<link rel="stylesheet" href="append.css">
</head>
<body>

<div class="top-bar">
  <a href="../index.html" class="nav-back">&larr; Menu</a>
  <h1>Power Query <em>Append</em> &mdash; pbi-vulcanus</h1>
  <div class="status-group">
    <span>Tabela: <span class="val" id="cntTable">–</span></span>
    <span>Wiersz: <span class="val" id="cntRow">–</span></span>
    <span>Wynik: <span class="val" id="cntResult">0</span></span>
    <span class="status-badge" id="statusBadge"><span class="dot"></span> <span id="statusText">Gotowy</span></span>
  </div>
</div>

<div class="app-layout">

  <div class="ribbon">
    <div class="ribbon-section">
      <div class="ribbon-group">
        <select id="dataPreset">
          <option value="orders">Zam&#243;wienia klient&#243;w</option>
          <option value="products">Produkty i sprzeda&#380;</option>
          <option value="suppliers">Dostawcy i magazyn</option>
        </select>
      </div>
      <div class="ribbon-section-label">Dane testowe</div>
    </div>

    <div class="ribbon-divider"></div>

    <div class="ribbon-section">
      <div class="ribbon-group">
        <select id="appendMode">
          <option value="two" selected>Dwie tabele</option>
          <option value="three">Trzy lub wi&#281;cej</option>
        </select>
        <div class="table-count-controls" id="tableCountControls" style="display:none;">
          <button class="btn" id="btnRemoveTable">&minus;</button>
          <span class="count-label" id="tableCountLabel">3</span>
          <button class="btn" id="btnAddTable">+</button>
        </div>
      </div>
      <div class="ribbon-section-label">Tryb</div>
    </div>

    <div class="ribbon-divider"></div>

    <div class="ribbon-section">
      <div class="ribbon-group">
        <button class="btn primary" id="btnStart">&#9654; Start</button>
        <button class="btn" id="btnPause" disabled>&#10074;&#10074;</button>
        <button class="btn" id="btnStep" disabled>&#9654;|</button>
        <button class="btn" id="btnReset">&#8634;</button>
        <div class="speed-control">
          <input type="range" id="speedSlider" min="100" max="2000" value="500" step="50">
          <span class="speed-val" id="speedVal">500 ms</span>
        </div>
      </div>
      <div class="ribbon-section-label">Sterowanie</div>
    </div>
  </div>

  <div class="main-content">

    <div class="sources-area">
      <div class="sources-header">Tabele &#378;r&#243;d&#322;owe</div>
      <div class="sources-scroll" id="sourcesScroll"></div>
    </div>

    <div class="result-area">
      <div class="result-header">&#9660; Wynik Append</div>
      <div class="result-scroll" id="resultScroll"></div>
    </div>

    <div class="log-area" id="logPanel"></div>
  </div>
</div>

<script src="../shared/datasets.js"></script>
<script src="../shared/engine.js"></script>
<script src="append.js"></script>
</body>
</html>
