<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge (Join) — pbi-vulcanus</title>
<link rel="stylesheet" href="../shared/theme.css">
<link rel="stylesheet" href="merge.css">
</head>
<body>

<div class="top-bar">
  <a href="../index.html" class="nav-back">&larr; Menu</a>
  <h1>Power Query <em>Merge</em> &mdash; pbi-vulcanus</h1>
  <div class="status-group">
    <span>Wiersz B: <span class="val" id="cntB">–</span></span>
    <span>Wiersz A: <span class="val" id="cntA">–</span></span>
    <span>Wynik: <span class="val" id="cntResult">0</span></span>
    <span class="status-badge" id="statusBadge"><span class="dot"></span> <span id="statusText">Gotowy</span></span>
  </div>
</div>

<div class="app-layout">

  <div class="ribbon">
    <div class="ribbon-section">
      <div class="ribbon-group">
        <select id="dataPreset">
          <option value="orders">Zam&#243;wienia klient&#243;w</option>
          <option value="products">Produkty i sprzeda&#380;</option>
          <option value="suppliers">Dostawcy i magazyn</option>
        </select>
      </div>
      <div class="ribbon-section-label">Dane testowe</div>
    </div>

    <div class="ribbon-divider"></div>

    <div class="ribbon-section">
      <div class="ribbon-group">
        <select id="joinType">
          <option value="inner">Inner Join</option>
          <option value="leftOuter" selected>Left Outer</option>
          <option value="rightOuter">Right Outer</option>
          <option value="fullOuter">Full Outer</option>
          <option value="leftAnti">Left Anti</option>
          <option value="rightAnti">Right Anti</option>
          <option value="leftSemi">Left Semi</option>
          <option value="rightSemi">Right Semi</option>
          <option value="fuzzy">Fuzzy</option>
        </select>
        <span class="join-desc" id="joinDesc"></span>
        <div class="fuzzy-controls" id="fuzzyControls">
          <label>Pr&#243;g:</label>
          <input type="range" id="fuzzyThreshold" min="0" max="100" value="60" step="5">
          <span class="speed-val" id="thresholdVal">0.60</span>
        </div>
      </div>
      <div class="ribbon-section-label">Typ joina</div>
    </div>

    <div class="ribbon-divider"></div>

    <div class="ribbon-section">
      <div class="ribbon-group">
        <button class="btn primary" id="btnStart">&#9654; Start</button>
        <button class="btn" id="btnPause" disabled>&#10074;&#10074;</button>
        <button class="btn" id="btnStep" disabled>&#9654;|</button>
        <button class="btn" id="btnReset">&#8634;</button>
        <div class="speed-control">
          <input type="range" id="speedSlider" min="100" max="2000" value="600" step="50">
          <span class="speed-val" id="speedVal">600 ms</span>
        </div>
      </div>
      <div class="ribbon-section-label">Sterowanie</div>
    </div>
  </div>

  <div class="main-content">
    <div class="tables-area">
      <svg id="connLines" class="conn-lines-svg"></svg>
      <div class="table-panel">
        <div class="table-panel-header tbl-a"><span class="tag">Left</span> Tabela A — Paragony</div>
        <div class="table-panel-body" id="panelA"></div>
      </div>
      <div class="table-panel">
        <div class="table-panel-header tbl-b"><span class="tag">Right</span> Tabela B — Cennik</div>
        <div class="table-panel-body" id="panelB"></div>
      </div>
      <div class="table-panel">
        <div class="table-panel-header tbl-r"><span class="tag">Wynik</span> Rezultat Merge</div>
        <div class="table-panel-body" id="panelResult"></div>
      </div>
    </div>
    <div class="log-area" id="logPanel"></div>
  </div>
</div>

<div class="compare-bubble" id="compareBubble"></div>

<script src="../shared/datasets.js"></script>
<script src="../shared/engine.js"></script>
<script src="merge.js"></script>
</body>
</html>
